stages:
  - build

variables:
  E2STUDIO: "C:\\Renesas\\e2_studio_2025_12\\eclipse\\e2studioc.exe"
  WORKSPACE: "C:\\workspace_rx72n"
  E2STUDIO_PROJECTS: "projects\\renesas\\rx72n_envision_kit\\e2studio"
  # Windows 260文字パス長制限の回避
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: "core.longpaths"
  GIT_CONFIG_VALUE_0: "true"
  # GIT_CLONE_PATH: $CI_BUILDS_DIR/rx72n
  # ↑ Runner の config.toml で [runners.custom_build_dir] enabled = true が必要。
  #   パス長が問題になった場合に有効化する。

build:
  stage: build
  tags:
    - run_ishiguro_machine
  script:
    # ワークスペースを毎回クリア（キャッシュによるビルドスキップを防ぐ）
    - if (Test-Path "$env:WORKSPACE") { Remove-Item -Recurse -Force "$env:WORKSPACE" }
    # aws_demos リンクファイル解決ワークアラウンド:
    # aws_demos は AWS FreeRTOS のポーティング構造に従い、ソースファイルを
    # vendors/ 配下にリンクファイル（.project の linkedResources）で参照している。
    # e2studio ヘッドレスビルドでは一部のリンクリソースが解決されないため、
    # ジャンクションを作成してリンクリソースを物理化する。
    - |
      $awsProj    = "$env:CI_PROJECT_DIR\$env:E2STUDIO_PROJECTS\aws_demos"
      $vendorsAws = "$env:CI_PROJECT_DIR\vendors\renesas\boards\rx72n-envision-kit\aws_demos"

      # 前回の CI ランの残骸があれば安全に除去（ジャンクションは rmdir で除去しないと
      # ターゲットの中身まで消える）
      @("$awsProj\src\smc_gen", "$awsProj\application_code", "$awsProj\config_files") | ForEach-Object {
        if (Test-Path $_) { cmd /c "rmdir `"$_`"" 2>$null; Remove-Item $_ -Recurse -Force -ErrorAction SilentlyContinue }
      }

      # src/smc_gen: Smart Configurator 生成コード（r_bsp, r_config, r_dmaca_rx, etc.）
      New-Item -ItemType Junction -Path "$awsProj\src\smc_gen" -Target "$vendorsAws\src\smc_gen" | Out-Null
      Write-Host "Junction: src/smc_gen -> vendors/.../src/smc_gen"

      # application_code: renesas_code, aws_code, main.c（.project の linkedResources）
      New-Item -ItemType Directory -Path "$awsProj\application_code" -Force | Out-Null
      New-Item -ItemType Junction -Path "$awsProj\application_code\renesas_code" -Target "$vendorsAws\application_code\renesas_code" | Out-Null
      New-Item -ItemType Junction -Path "$awsProj\application_code\aws_code" -Target "$vendorsAws\application_code\aws_code" | Out-Null
      Copy-Item "$vendorsAws\application_code\main.c" "$awsProj\application_code\main.c"
      Write-Host "Junction: application_code/renesas_code, aws_code -> vendors/..."

      # config_files: FreeRTOS/AWS 設定ヘッダ群
      New-Item -ItemType Junction -Path "$awsProj\config_files" -Target "$vendorsAws\config_files" | Out-Null
      Write-Host "Junction: config_files -> vendors/.../config_files"
    # ビルド実行（インポート + cleanBuild）
    # e2studio ヘッドレスビルドの Makefile 生成器は深いディレクトリの mkdir ルールを
    # 生成しないことがあるため、ビルド失敗時にディレクトリを補完してリトライする。
    - |
      $logFile = "$env:CI_PROJECT_DIR\e2studio_build.log"
      $e2base = @("--launcher.suppressErrors", "-nosplash", "-application", "org.eclipse.cdt.managedbuilder.core.headlessbuild", "-data", "$env:WORKSPACE")
      $imports = @("-import", "$env:CI_PROJECT_DIR\$env:E2STUDIO_PROJECTS\aws_demos", "-import", "$env:CI_PROJECT_DIR\$env:E2STUDIO_PROJECTS\boot_loader", "-import", "$env:CI_PROJECT_DIR\$env:E2STUDIO_PROJECTS\segger_emwin_demos")

      Write-Host "=== Pass 1: Import + cleanBuild all ==="
      Write-Host "(e2studio output saved to e2studio_build.log artifact)"
      # Tee-Object でファイルに保存しつつ Out-Null で job log への出力を抑制
      # （Tee-Object 経由は pipeline #127 で動作確認済み。Out-Null で 4MB 制限回避）
      & "$env:E2STUDIO" @e2base @imports -cleanBuild all 2>&1 | Tee-Object -FilePath $logFile | Out-Null
      $e2exit = $LASTEXITCODE
      Write-Host "e2studio exit code: $e2exit"
      $logSize = (Get-Item $logFile -ErrorAction SilentlyContinue).Length
      Write-Host "Build log size: $([Math]::Round($logSize / 1MB, 2)) MB"

      # 診断: ワークスペースのプロジェクト一覧
      Write-Host "--- Workspace projects ---"
      Get-ChildItem "$env:WORKSPACE" -Directory -ErrorAction SilentlyContinue | ForEach-Object {
        $hd = "$($_.FullName)\HardwareDebug"
        $hdExists = Test-Path $hd
        $motCount = if ($hdExists) { (Get-ChildItem "$hd\*.mot" -ErrorAction SilentlyContinue).Count } else { 0 }
        $objCount = if ($hdExists) { (Get-ChildItem $hd -Recurse -Filter "*.obj" -ErrorAction SilentlyContinue).Count } else { 0 }
        Write-Host "  $($_.Name): HardwareDebug=$hdExists, .mot=$motCount, .obj=$objCount"
      }

      # 診断: ビルドログの末尾30行
      Write-Host "--- Build log tail ---"
      Get-Content $logFile -Tail 30 | ForEach-Object { Write-Host "  $_" }

      # make レシピエラーの前後コンテキストを表示（実際のコンパイラエラーを特定）
      $recipeErrors = Select-String -Path $logFile -Pattern '\*\*\* \[' -Context 15,2 -ErrorAction SilentlyContinue
      if ($recipeErrors) {
        Write-Host "--- Compilation errors with context ($($recipeErrors.Count) targets failed) ---"
        $recipeErrors | Select-Object -First 5 | ForEach-Object {
          Write-Host ""
          $_.Context.PreContext | ForEach-Object { Write-Host "  > $_".Substring(0, [Math]::Min($_.Length + 4, 250)) }
          Write-Host "  >>> $($_.Line.Substring(0, [Math]::Min($_.Line.Length, 250)))"
          $_.Context.PostContext | ForEach-Object { Write-Host "  > $_".Substring(0, [Math]::Min($_.Length + 4, 250)) }
        }
      }

      # CC-RX コンパイラエラー検出（E0520=error, F0520=fatal, W0520=warning）
      $ccrxErrors = Select-String -Path $logFile -Pattern '^[EFW]\d{4}' -ErrorAction SilentlyContinue
      if ($ccrxErrors) {
        Write-Host ""
        Write-Host "--- CC-RX compiler errors/warnings ($($ccrxErrors.Count) lines) ---"
        $ccrxErrors | Select-Object -First 30 | ForEach-Object { Write-Host "  $($_.LineNumber): $($_.Line.Substring(0, [Math]::Min($_.Line.Length, 250)))" }
      }

      # make の終了ステータス行
      $makeStatus = Select-String -Path $logFile -Pattern '(terminated with exit code|Build might be incomplete|\*\*\* No rule)' -ErrorAction SilentlyContinue
      if ($makeStatus) {
        Write-Host ""
        Write-Host "--- Make status lines ---"
        $makeStatus | ForEach-Object { Write-Host "  $($_.LineNumber): $($_.Line.Substring(0, [Math]::Min($_.Line.Length, 250)))" }
      }

      # .mot ファイルを検索（ワークスペース側 → ソースディレクトリ側の順にフォールバック）
      # boot_loader のワークスペース名は rx72n_boot（.cproject の buildPath による）
      $mot_aws   = Get-ChildItem "$env:WORKSPACE\aws_demos\HardwareDebug\*.mot" -ErrorAction SilentlyContinue
      if (-not $mot_aws) { $mot_aws = Get-ChildItem "$env:CI_PROJECT_DIR\$env:E2STUDIO_PROJECTS\aws_demos\HardwareDebug\*.mot" -ErrorAction SilentlyContinue }
      $mot_boot  = Get-ChildItem "$env:WORKSPACE\rx72n_boot\HardwareDebug\*.mot" -ErrorAction SilentlyContinue
      if (-not $mot_boot) { $mot_boot = Get-ChildItem "$env:WORKSPACE\rx72n_boot_loader\HardwareDebug\*.mot" -ErrorAction SilentlyContinue }
      if (-not $mot_boot) { $mot_boot = Get-ChildItem "$env:CI_PROJECT_DIR\$env:E2STUDIO_PROJECTS\boot_loader\HardwareDebug\*.mot" -ErrorAction SilentlyContinue }
      $mot_emwin = Get-ChildItem "$env:WORKSPACE\segger_emwin_demos\HardwareDebug\*.mot" -ErrorAction SilentlyContinue
      if (-not $mot_emwin) { $mot_emwin = Get-ChildItem "$env:CI_PROJECT_DIR\$env:E2STUDIO_PROJECTS\segger_emwin_demos\HardwareDebug\*.mot" -ErrorAction SilentlyContinue }

      # aws_demos のビルド失敗時: 不足ディレクトリを補完してリトライ
      # e2studio の Makefile 生成器はリンクリソースの深いパスに対して mkdir ルールを
      # 生成しないことがあり、SubCommand.tmp の書き込みに失敗する。
      # ビルド出力はワークスペースではなくソースディレクトリの HardwareDebug/ に生成される。
      if (-not $mot_aws) {
        Write-Host ""
        Write-Host "=== aws_demos .mot not found - fixing output directories and retrying ==="
        # ビルド出力はソースディレクトリに生成される（ワークスペースは .metadata のみ）
        $awsHD = "$env:CI_PROJECT_DIR\$env:E2STUDIO_PROJECTS\aws_demos\HardwareDebug"
        Write-Host "Scanning: $awsHD"
        $created = 0
        if (Test-Path $awsHD) {
          Get-ChildItem $awsHD -Recurse -Filter "subdir.mk" -ErrorAction SilentlyContinue | ForEach-Object {
            $mkContent = Get-Content $_.FullName -Raw
            # subdir.mk 内の .obj パスからディレクトリを抽出して作成
            [regex]::Matches($mkContent, '(\S+)\.obj') | ForEach-Object {
              $objRel = $_.Groups[1].Value + ".obj"
              $objDir = Split-Path "$awsHD\$objRel" -Parent
              if ($objDir -and -not (Test-Path $objDir)) {
                New-Item -ItemType Directory -Path $objDir -Force | Out-Null
                Write-Host "  Created: $objDir"
                $created++
              }
            }
          }
          Write-Host "Created $created missing directories"
          # subdir.mk の総数も表示
          $mkCount = (Get-ChildItem $awsHD -Recurse -Filter "subdir.mk" -ErrorAction SilentlyContinue).Count
          Write-Host "Total subdir.mk files found: $mkCount"
        } else {
          Write-Host "WARNING: HardwareDebug directory not found at $awsHD"
        }

        Write-Host "=== Pass 2: Rebuild aws_demos ==="
        $logPass2 = "$logFile.pass2"
        & "$env:E2STUDIO" @e2base -build "aws_demos/HardwareDebug" 2>&1 | Tee-Object -FilePath $logPass2 | Out-Null
        Write-Host "e2studio exit code (retry): $LASTEXITCODE"
        # Pass 2 ログを結合
        Get-Content $logPass2 | Add-Content $logFile
        # Pass 2: make レシピエラーのコンテキスト
        $recipeErrors2 = Select-String -Path $logPass2 -Pattern '\*\*\* \[' -Context 15,2 -ErrorAction SilentlyContinue
        if ($recipeErrors2) {
          Write-Host "--- Pass 2 compilation errors with context ---"
          $recipeErrors2 | Select-Object -First 5 | ForEach-Object {
            Write-Host ""
            $_.Context.PreContext | ForEach-Object { Write-Host "  > $_".Substring(0, [Math]::Min($_.Length + 4, 250)) }
            Write-Host "  >>> $($_.Line.Substring(0, [Math]::Min($_.Line.Length, 250)))"
            $_.Context.PostContext | ForEach-Object { Write-Host "  > $_".Substring(0, [Math]::Min($_.Length + 4, 250)) }
          }
        }
        # Pass 2: CC-RX エラー
        $ccrxErrors2 = Select-String -Path $logPass2 -Pattern '^[EFW]\d{4}' -ErrorAction SilentlyContinue
        if ($ccrxErrors2) {
          Write-Host "--- Pass 2 CC-RX errors ---"
          $ccrxErrors2 | Select-Object -First 20 | ForEach-Object { Write-Host "  $($_.LineNumber): $($_.Line.Substring(0, [Math]::Min($_.Line.Length, 250)))" }
        }

        $mot_aws = Get-ChildItem "$env:CI_PROJECT_DIR\$env:E2STUDIO_PROJECTS\aws_demos\HardwareDebug\*.mot" -ErrorAction SilentlyContinue
      }

      # 診断: 見つかった .mot ファイルの一覧
      Write-Host ""
      Write-Host "--- .mot search results ---"
      Write-Host "  aws_demos:          $(if ($mot_aws) { $mot_aws.FullName } else { 'NOT FOUND' })"
      Write-Host "  boot_loader:        $(if ($mot_boot) { $mot_boot.FullName } else { 'NOT FOUND' })"
      Write-Host "  segger_emwin_demos: $(if ($mot_emwin) { $mot_emwin.FullName } else { 'NOT FOUND' })"

      $missing = @()
      if (-not $mot_aws)   { $missing += "aws_demos" }
      if (-not $mot_boot)  { $missing += "boot_loader" }
      if (-not $mot_emwin) { $missing += "segger_emwin_demos" }
      if ($missing.Count -gt 0) {
        Write-Host "ERROR: .mot file not found for: $($missing -join ', ')"
        Write-Host "Full e2studio log saved as artifact: e2studio_build.log"
        exit 1
      }

      Write-Host ""
      Write-Host "All 3 .mot files generated successfully!"

      # .mot ファイルをソースディレクトリにコピー（artifacts 収集用）
      $projDir = "$env:CI_PROJECT_DIR\$env:E2STUDIO_PROJECTS"
      @("aws_demos", "boot_loader", "segger_emwin_demos") | ForEach-Object {
        $destDir = "$projDir\$_\HardwareDebug"
        if (-not (Test-Path $destDir)) { New-Item -ItemType Directory -Path $destDir -Force | Out-Null }
      }
      if ($mot_aws.DirectoryName -ne "$projDir\aws_demos\HardwareDebug") {
        Copy-Item $mot_aws.FullName "$projDir\aws_demos\HardwareDebug\" -Force
      }
      if ($mot_boot.DirectoryName -ne "$projDir\boot_loader\HardwareDebug") {
        Copy-Item $mot_boot.FullName "$projDir\boot_loader\HardwareDebug\" -Force
      }
      if ($mot_emwin.DirectoryName -ne "$projDir\segger_emwin_demos\HardwareDebug") {
        Copy-Item $mot_emwin.FullName "$projDir\segger_emwin_demos\HardwareDebug\" -Force
      }

      Write-Host "Build artifacts:"
      Write-Host "  aws_demos:          $($mot_aws.FullName)"
      Write-Host "  boot_loader:        $($mot_boot.FullName)"
      Write-Host "  segger_emwin_demos: $($mot_emwin.FullName)"
  artifacts:
    when: always
    paths:
      - e2studio_build.log
      - projects/renesas/rx72n_envision_kit/e2studio/aws_demos/HardwareDebug/*.mot
      - projects/renesas/rx72n_envision_kit/e2studio/boot_loader/HardwareDebug/*.mot
      - projects/renesas/rx72n_envision_kit/e2studio/segger_emwin_demos/HardwareDebug/*.mot
    expire_in: 1 week
