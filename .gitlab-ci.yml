stages:
  - build
  - flash
  - test

# MR パイプライン (merge_request_event) を抑止。
# rules: 付きジョブと rules: なしジョブが混在すると、MR パイプラインで
# needs: の依存先が見つからず即座に失敗するため、ブランチパイプラインのみ使用する。
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: never
    - when: always

variables:
  E2STUDIO: "C:\\Renesas\\e2_studio_2025_12\\eclipse\\e2studioc.exe"
  WORKSPACE: "C:\\workspace_rx72n"
  E2STUDIO_PROJECTS: "projects\\renesas\\rx72n_envision_kit\\e2studio"
  # Renesas Flash Programmer CLI
  RFP_CLI: "C:\\Program Files (x86)\\Renesas Electronics\\Programming Tools\\Renesas Flash Programmer V3.22\\rfp-cli.exe"
  # --- ハードウェア依存変数（hardware-config リポジトリの CI/CD Variables から取得） ---
  # USB 抜き差しで COM 番号が変わった場合は、hardware-config リポジトリの CLAUDE.md を
  # 更新し、/oss グループの CI/CD Variables を変更すること（本ファイルの修正は不要）。
  # E2 Lite シリアル番号 (ECN1 コネクタ)
  E2LITE_SERIAL: "${E2L_SERIAL_ENVISION_KIT_RX72N_ECN1}"
  # UART ログ / ダウンロード用（CN6 PMOD FTDI, SCI7, 921600bps）
  UART_PORT: "${UART_PORT_ENVISION_KIT_RX72N_CN6}"
  UART_BAUD_RATE: "921600"
  UART_TIMEOUT_SEC: "30"
  # コマンドインターフェース用（CN8 USB Serial, SCI2, 115200bps）
  COMMAND_PORT: "${UART_PORT_ENVISION_KIT_RX72N_CN8}"
  COMMAND_BAUD_RATE: "115200"
  # デバイス ID（device_config.json で定義、複数デバイス時に切り替え）
  DEVICE_ID: "rx72n-01"
  # Git サブモジュール初期化（coreSNTP 等の外部ライブラリ）
  GIT_SUBMODULE_STRATEGY: recursive
  # Windows 260文字パス長制限の回避
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: "core.longpaths"
  GIT_CONFIG_VALUE_0: "true"
  # GIT_CLONE_PATH: $CI_BUILDS_DIR/rx72n
  # ↑ Runner の config.toml で [runners.custom_build_dir] enabled = true が必要。
  #   パス長が問題になった場合に有効化する。
  #
  # --- パイプライン条件分岐 ---
  # GitLab UI の「Run Pipeline」画面でオーバーライド可能。
  # RUN_AWS_TESTS:      AWS 接続テスト (provision, MQTT) を実行するか
  # RUN_SD_UPDATE_TEST: SD カードファームウェア更新テストを実行するか
  # RUN_OTA_TEST:       OTA テスト (build_ota, flash_ota, test_ota) を実行するか
  # デフォルトはフルテスト（MR マージ前に全テスト通過を保証）。
  # ダミーブランチで個別テストを回す場合は変数をオーバーライドする。
  RUN_AWS_TESTS: "true"
  RUN_SD_UPDATE_TEST: "true"
  RUN_OTA_TEST: "true"
  # RUN_OTA_ONLY: OTA テストのみ実行するショートカットモード。
  # "true" にすると通常のビルド/フラッシュ/テストジョブをスキップし、
  # build_ota → prepare_ota → test_ota のみ実行する。
  # OTA デバッグ中のイテレーション高速化用。安定後は "false" に戻すこと。
  RUN_OTA_ONLY: "false"

build:
  stage: build
  tags:
    - run_ishiguro_machine
  rules:
    - if: $RUN_OTA_ONLY == "true"
      when: never
    - when: always
  script:
    # ワークスペースと HardwareDebug をクリア（stale Makefile とキャッシュの除去）
    - if (Test-Path "$env:WORKSPACE") { Remove-Item -Recurse -Force "$env:WORKSPACE" }
    - |
      @("aws_demos", "boot_loader", "segger_emwin_demos") | ForEach-Object {
        $hd = "$env:CI_PROJECT_DIR\$env:E2STUDIO_PROJECTS\$_\HardwareDebug"
        if (Test-Path $hd) { Remove-Item -Recurse -Force $hd; Write-Host "Cleared: $hd" }
      }
    # Windows 260文字パス長制限ワークアラウンド:
    # e2studio の CDT managed build は ${ProjDirPath}/../../../../../vendors/... パターンで
    # インクルードパスを生成する。GitLab Runner のチェックアウトパスが長い場合（約80文字）、
    # ${ProjDirPath}（約137文字）+ /../../../../../ + vendors/.../ + header.h が
    # 260文字を超えて CC-RX が F0520005 (Cannot open source file) になる。
    # 解決策: CI_PROJECT_DIR への短いジャンクションを作成し、そこからプロジェクトをインポート。
    # これにより ${ProjDirPath} が約65文字に短縮される。
    - |
      $shortRoot = "C:\rx72n-src"
      if (Test-Path $shortRoot) { cmd /c "rmdir `"$shortRoot`"" 2>$null }
      New-Item -ItemType Junction -Path $shortRoot -Target "$env:CI_PROJECT_DIR" | Out-Null
      Write-Host "Junction: $shortRoot -> $env:CI_PROJECT_DIR"
      Write-Host "  CI_PROJECT_DIR length: $($env:CI_PROJECT_DIR.Length) chars"
      Write-Host "  Short root length:     $($shortRoot.Length) chars"
      Write-Host "  Saved:                 $($env:CI_PROJECT_DIR.Length - $shortRoot.Length) chars"
    # aws_demos リンクファイル解決ワークアラウンド:
    # aws_demos は AWS FreeRTOS のポーティング構造に従い、ソースファイルを
    # vendors/ 配下にリンクファイル（.project の linkedResources）で参照している。
    # e2studio ヘッドレスビルドでは一部のリンクリソースが解決されないため、
    # ジャンクションを作成してリンクリソースを物理化する。
    - |
      $awsProj    = "$env:CI_PROJECT_DIR\$env:E2STUDIO_PROJECTS\aws_demos"
      $vendorsAws = "$env:CI_PROJECT_DIR\vendors\renesas\boards\rx72n-envision-kit\aws_demos"

      # 前回の CI ランの残骸があれば安全に除去（ジャンクションは rmdir で除去しないと
      # ターゲットの中身まで消える）
      @("$awsProj\src\smc_gen", "$awsProj\application_code", "$awsProj\config_files") | ForEach-Object {
        if (Test-Path $_) { cmd /c "rmdir `"$_`"" 2>$null; Remove-Item $_ -Recurse -Force -ErrorAction SilentlyContinue }
      }

      # src/smc_gen: インクルードパスの解決のみ（r_config サブディレクトリのみジャンクション化）
      # 注意: src/smc_gen 全体をジャンクションにすると、.project の
      # application_code/smc_gen リンクリソース（同じ物理ディレクトリを参照）と二重コンパイルされ
      # E0562300 (Duplicate symbol) になる。r_config のみ作成すればインクルードパスが解決する。
      New-Item -ItemType Directory -Path "$awsProj\src\smc_gen" -Force | Out-Null
      New-Item -ItemType Junction -Path "$awsProj\src\smc_gen\r_config" -Target "$vendorsAws\src\smc_gen\r_config" | Out-Null
      Write-Host "Junction: src/smc_gen/r_config -> vendors/.../src/smc_gen/r_config (include path only)"

      # application_code: renesas_code, aws_code, smc_gen, main.c（.project の linkedResources）
      New-Item -ItemType Directory -Path "$awsProj\application_code" -Force | Out-Null
      New-Item -ItemType Junction -Path "$awsProj\application_code\renesas_code" -Target "$vendorsAws\application_code\renesas_code" | Out-Null
      New-Item -ItemType Junction -Path "$awsProj\application_code\aws_code" -Target "$vendorsAws\application_code\aws_code" | Out-Null
      New-Item -ItemType Junction -Path "$awsProj\application_code\smc_gen" -Target "$vendorsAws\src\smc_gen" | Out-Null
      Copy-Item "$vendorsAws\application_code\main.c" "$awsProj\application_code\main.c"
      Write-Host "Junction: application_code/{renesas_code,aws_code,smc_gen} -> vendors/..."

      # config_files: FreeRTOS/AWS 設定ヘッダ群
      New-Item -ItemType Junction -Path "$awsProj\config_files" -Target "$vendorsAws\config_files" | Out-Null
      Write-Host "Junction: config_files -> vendors/.../config_files"
    # ビルド実行（インポート + cleanBuild）
    # 短いジャンクションパスからインポートすることで ${ProjDirPath} を短縮
    - |
      $shortRoot = "C:\rx72n-src"
      $shortProj = "$shortRoot\$env:E2STUDIO_PROJECTS"
      $logFile = "$env:CI_PROJECT_DIR\e2studio_build.log"
      $e2base = @("--launcher.suppressErrors", "-nosplash", "-application", "org.eclipse.cdt.managedbuilder.core.headlessbuild", "-data", "$env:WORKSPACE")
      $imports = @("-import", "$shortProj\aws_demos", "-import", "$shortProj\boot_loader", "-import", "$shortProj\segger_emwin_demos")

      Write-Host "=== Import + cleanBuild all ==="
      Write-Host "Import paths (short junction):"
      Write-Host "  aws_demos:          $shortProj\aws_demos"
      Write-Host "  boot_loader:        $shortProj\boot_loader"
      Write-Host "  segger_emwin_demos: $shortProj\segger_emwin_demos"
      Write-Host "(e2studio output saved to e2studio_build.log artifact)"
      # Tee-Object でファイルに保存しつつ Out-Null で job log への出力を抑制（4MB 制限回避）
      & "$env:E2STUDIO" @e2base @imports -cleanBuild all 2>&1 | Tee-Object -FilePath $logFile | Out-Null
      $e2exit = $LASTEXITCODE
      Write-Host "e2studio exit code: $e2exit"
      $logSize = (Get-Item $logFile -ErrorAction SilentlyContinue).Length
      Write-Host "Build log size: $([Math]::Round($logSize / 1MB, 2)) MB"

      # 診断: ビルドログの末尾30行
      Write-Host "--- Build log tail ---"
      Get-Content $logFile -Tail 30 | ForEach-Object { Write-Host "  $_" }

      # make レシピエラーの前後コンテキストを表示（実際のコンパイラエラーを特定）
      $recipeErrors = Select-String -Path $logFile -Pattern '\*\*\* \[' -Context 15,2 -ErrorAction SilentlyContinue
      if ($recipeErrors) {
        Write-Host "--- Compilation errors with context ($($recipeErrors.Count) targets failed) ---"
        $recipeErrors | Select-Object -First 5 | ForEach-Object {
          Write-Host ""
          $_.Context.PreContext | ForEach-Object { Write-Host "  > $_".Substring(0, [Math]::Min($_.Length + 4, 250)) }
          Write-Host "  >>> $($_.Line.Substring(0, [Math]::Min($_.Line.Length, 250)))"
          $_.Context.PostContext | ForEach-Object { Write-Host "  > $_".Substring(0, [Math]::Min($_.Length + 4, 250)) }
        }
      }

      # CC-RX コンパイラエラー検出（E0520=error, F0520=fatal, W0520=warning）
      $ccrxErrors = Select-String -Path $logFile -Pattern '^[EFW]\d{4}' -ErrorAction SilentlyContinue
      if ($ccrxErrors) {
        Write-Host ""
        Write-Host "--- CC-RX compiler errors/warnings ($($ccrxErrors.Count) lines) ---"
        $ccrxErrors | Select-Object -First 30 | ForEach-Object { Write-Host "  $($_.LineNumber): $($_.Line.Substring(0, [Math]::Min($_.Line.Length, 250)))" }
      }

      # make の終了ステータス行
      $makeStatus = Select-String -Path $logFile -Pattern '(terminated with exit code|Build might be incomplete|\*\*\* No rule)' -ErrorAction SilentlyContinue
      if ($makeStatus) {
        Write-Host ""
        Write-Host "--- Make status lines ---"
        $makeStatus | ForEach-Object { Write-Host "  $($_.LineNumber): $($_.Line.Substring(0, [Math]::Min($_.Line.Length, 250)))" }
      }

      # .mot ファイルを検索
      # ビルド出力先はジャンクション経由のソースディレクトリ（ワークスペースには .metadata のみ）
      $mot_aws   = Get-ChildItem "$shortProj\aws_demos\HardwareDebug\*.mot" -ErrorAction SilentlyContinue
      if (-not $mot_aws) { $mot_aws = Get-ChildItem "$env:CI_PROJECT_DIR\$env:E2STUDIO_PROJECTS\aws_demos\HardwareDebug\*.mot" -ErrorAction SilentlyContinue }
      $mot_boot  = Get-ChildItem "$env:WORKSPACE\rx72n_boot_loader\HardwareDebug\*.mot" -ErrorAction SilentlyContinue
      if (-not $mot_boot) { $mot_boot = Get-ChildItem "$shortProj\boot_loader\HardwareDebug\*.mot" -ErrorAction SilentlyContinue }
      if (-not $mot_boot) { $mot_boot = Get-ChildItem "$env:CI_PROJECT_DIR\$env:E2STUDIO_PROJECTS\boot_loader\HardwareDebug\*.mot" -ErrorAction SilentlyContinue }
      $mot_emwin = Get-ChildItem "$env:WORKSPACE\segger_emwin_demos\HardwareDebug\*.mot" -ErrorAction SilentlyContinue
      if (-not $mot_emwin) { $mot_emwin = Get-ChildItem "$shortProj\segger_emwin_demos\HardwareDebug\*.mot" -ErrorAction SilentlyContinue }
      if (-not $mot_emwin) { $mot_emwin = Get-ChildItem "$env:CI_PROJECT_DIR\$env:E2STUDIO_PROJECTS\segger_emwin_demos\HardwareDebug\*.mot" -ErrorAction SilentlyContinue }

      # 診断: 見つかった .mot ファイルの一覧
      Write-Host ""
      Write-Host "--- .mot search results ---"
      Write-Host "  aws_demos:          $(if ($mot_aws) { $mot_aws.FullName } else { 'NOT FOUND' })"
      Write-Host "  boot_loader:        $(if ($mot_boot) { $mot_boot.FullName } else { 'NOT FOUND' })"
      Write-Host "  segger_emwin_demos: $(if ($mot_emwin) { $mot_emwin.FullName } else { 'NOT FOUND' })"

      $missing = @()
      if (-not $mot_aws)   { $missing += "aws_demos" }
      if (-not $mot_boot)  { $missing += "boot_loader" }
      if (-not $mot_emwin) { $missing += "segger_emwin_demos" }
      if ($missing.Count -gt 0) {
        Write-Host "ERROR: .mot file not found for: $($missing -join ', ')"
        Write-Host "Full e2studio log saved as artifact: e2studio_build.log"
        exit 1
      }

      Write-Host ""
      Write-Host "All 3 .mot files generated successfully!"

      Write-Host "Build artifacts (via junction = CI_PROJECT_DIR):"
      Write-Host "  aws_demos:          $($mot_aws.FullName)"
      Write-Host "  boot_loader:        $($mot_boot.FullName)"
      Write-Host "  segger_emwin_demos: $($mot_emwin.FullName)"
  artifacts:
    when: always
    paths:
      - e2studio_build.log
      - projects/renesas/rx72n_envision_kit/e2studio/aws_demos/HardwareDebug/*.mot
      - projects/renesas/rx72n_envision_kit/e2studio/boot_loader/HardwareDebug/*.mot
      - projects/renesas/rx72n_envision_kit/e2studio/segger_emwin_demos/HardwareDebug/*.mot
    expire_in: 1 week

flash_boot_loader:
  stage: flash
  tags:
    - run_ishiguro_machine
  resource_group: rx72n-device
  rules:
    - if: $RUN_OTA_ONLY == "true"
      when: never
    - when: always
  needs: [build]
  script:
    - |
      $mot = "$env:CI_PROJECT_DIR\$env:E2STUDIO_PROJECTS\boot_loader\HardwareDebug\rx72n_boot_loader.mot"
      if (-not (Test-Path $mot)) {
        Write-Host "ERROR: $mot not found"
        exit 1
      }
      Write-Host "=== Flash boot_loader ==="
      Write-Host "  .mot:    $mot"
      Write-Host "  Device:  RX72x"
      Write-Host "  Tool:    E2 Lite ($env:E2LITE_SERIAL)"
      Write-Host "  I/F:     FINE"
    # rfp-cli で boot_loader を書き込み + 実行
    # -erase-chip: Config Area (BANKSEL 含む) も消去。通常の -e (= -erase) は Code Flash +
    #   Data Flash のみ消去し Config Area は消去しない。前回の UART ダウンロードで
    #   boot_loader が bank swap を実行すると BANKSEL が 0xF8 (bank1 起動) に反転する。
    #   Config Area はフラッシュの性質上 1→0 書き換えのみ可能なため、-e だけでは
    #   BANKSEL を 0xFF (bank0 起動) に戻せず、.mot 内の BANKSEL 値 (0xFFFFFFFF) と
    #   デバイス上の値 (0xFFFFFFF8) が不一致となり verify が失敗する。
    # -run: 書き込み後にターゲットプログラムを実行開始（必須、省略すると MCU 停止）
    # 注意: COM7 (PMOD FTDI) は E2 Lite と別の USB デバイスのため、rfp-cli のデバッガ
    #   切断時の USB バスリセットの影響を受けない（旧 COM6 では問題だった）。
    #   boot_loader の UART バナー検証は download_aws_demos ステップで暗黙的に行う。
    - |
      $mot = "$env:CI_PROJECT_DIR\$env:E2STUDIO_PROJECTS\boot_loader\HardwareDebug\rx72n_boot_loader.mot"
      # Step 1: erase-chip（Config Area 含む全消去。-erase-chip は他の操作と併用不可）
      & "$env:RFP_CLI" -device RX72x -tool "e2l:$env:E2LITE_SERIAL" -if fine -speed 1500K `
        -auth id FFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFF -erase-chip -noquery
      if ($LASTEXITCODE -ne 0) {
        Write-Host "ERROR: Erase-chip failed with exit code $LASTEXITCODE"
        exit 1
      }
      # Step 2: program + verify + run
      & "$env:RFP_CLI" -device RX72x -tool "e2l:$env:E2LITE_SERIAL" -if fine -speed 1500K `
        -auth id FFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFF -p "$mot" -v -run -noquery
      if ($LASTEXITCODE -ne 0) {
        Write-Host "ERROR: Flash failed with exit code $LASTEXITCODE"
        exit 1
      }
      Write-Host "Flash completed successfully. Boot loader is running."
      Write-Host "  UART verification deferred to download_aws_demos step."

download_aws_demos:
  stage: flash
  tags:
    - run_ishiguro_machine
  resource_group: rx72n-device
  rules:
    - if: $RUN_OTA_ONLY == "true"
      when: never
    - when: always
  needs:
    - job: build
      artifacts: true
    - job: flash_boot_loader
  variables:
    # .rsu 生成に使うシーケンス番号（OTA 更新ごとに増加させる）
    RSU_SEQ_NO: "1"
  script:
    # Step 1: 依存パッケージのインストール
    - pip install cryptography pyserial
    # Step 2: aws_demos.mot → userprog.rsu 変換
    - |
      $mot = "$env:CI_PROJECT_DIR\$env:E2STUDIO_PROJECTS\aws_demos\HardwareDebug\aws_demos.mot"
      if (-not (Test-Path $mot)) {
        Write-Host "ERROR: aws_demos.mot not found: $mot"
        exit 1
      }
      $rsu = "$env:CI_PROJECT_DIR\userprog.rsu"
      $key = "$env:CI_PROJECT_DIR\sample_keys\secp256r1.privatekey"
      Write-Host "=== Convert .mot to .rsu ==="
      Write-Host "  MOT: $mot"
      Write-Host "  Key: $key"
      Write-Host "  RSU: $rsu"
      Write-Host "  Seq: $env:RSU_SEQ_NO"
      python "$env:CI_PROJECT_DIR\tools\mcu-tool-rx\mot_to_rsu.py" `
        --mot "$mot" --key "$key" -o "$rsu" --seq-no $env:RSU_SEQ_NO
      if ($LASTEXITCODE -ne 0) {
        Write-Host "ERROR: mot_to_rsu conversion failed"
        exit 1
      }
    # Step 3: UART で .rsu をブートローダに送信
    # boot_loader は flash_boot_loader ジョブで書き込み・起動済み。
    # rfp-cli -run でデバッガ経由で起動後、"send userprog.rsu via UART." を出力し
    # UART 受信待ち状態になっている。
    - |
      $rsu = "$env:CI_PROJECT_DIR\userprog.rsu"
      Write-Host "=== UART Download ==="
      Write-Host "  RSU:  $rsu"
      Write-Host "  Port: $env:UART_PORT @ ${env:UART_BAUD_RATE}bps"
      python "$env:CI_PROJECT_DIR\test_scripts\uart_test\test_uart_download.py" `
        --rsu "$rsu" --port "$env:UART_PORT" --baud $env:UART_BAUD_RATE `
        --timeout 300 --diag
      if ($LASTEXITCODE -ne 0) {
        Write-Host "ERROR: UART download failed"
        exit 1
      }
  artifacts:
    paths:
      - userprog.rsu
    expire_in: 1 week

test_commands:
  stage: test
  tags:
    - run_ishiguro_machine
  resource_group: rx72n-device
  timeout: 5 minutes
  rules:
    - if: $RUN_OTA_ONLY == "true"
      when: never
    - when: always
  needs:
    - job: download_aws_demos
    # provision_aws_credentials も COMMAND_PORT を使用するため、同時実行を防止。
    # RUN_AWS_TESTS=false 時は provision がスキップされるため optional: true。
    - job: provision_aws_credentials
      optional: true
  variables:
    COMMAND_TIMEOUT: "10"
  before_script:
    # ポートロック対策: 前回ジョブの残留プロセスが COM ポートを掴んでいる場合がある。
    # ジョブ停止時に Python プロセスが正常終了せずシリアルポートがロックされると、
    # 次回ジョブで PermissionError になる。
    # 注意: Get-Process -Name python は該当プロセスがないと $? が $false になり、
    #   GitLab Runner の PowerShell ラッパーが exit 1 する。
    #   Get-Process（名前指定なし）+ Where-Object でフィルタすることで回避。
    - |
      Get-Process | Where-Object { $_.ProcessName -eq 'python' -and $_.Id -ne $PID } |
        ForEach-Object {
          Write-Host "[WARN] Killing stale Python PID=$($_.Id) StartTime=$($_.StartTime)"
          Stop-Process -Id $_.Id -Force -ErrorAction SilentlyContinue
        }
      Start-Sleep -Seconds 1
    - pip install pyserial
  script:
    # aws_demos は download_aws_demos ジョブで書き込み・起動済み。
    # boot_loader の bank swap + reset 後に aws_demos が自動起動し、
    # コマンドターミナルが SCI2 (COM6, 115200bps) で待機状態になっている。
    # serial_terminal_task は GUI 初期化完了後に起動する（LCD タッチ不要）。
    - |
      Write-Host "=== UART Command-Response Test ==="
      Write-Host "  Port: $env:COMMAND_PORT @ ${env:COMMAND_BAUD_RATE}bps"
      # --skip-erase: provision_aws_credentials が flash stage でプロビジョニング済み。
      #   dataflash erase を実行すると endpoint/cert 等が消去され confirm_aws_mqtt が失敗する。
      python "$env:CI_PROJECT_DIR\test_scripts\uart_test\test_aws_demos_commands.py" `
        --port "$env:COMMAND_PORT" --baud $env:COMMAND_BAUD_RATE `
        --timeout $env:COMMAND_TIMEOUT --prompt-timeout 60 --initial-wait 3 `
        --skip-erase

test_screen_navigation:
  stage: test
  tags:
    - run_ishiguro_machine
  resource_group: rx72n-device
  timeout: 3 minutes
  rules:
    - if: $RUN_OTA_ONLY == "true"
      when: never
    - when: always
  needs:
    - job: test_commands
  before_script:
    - |
      Get-Process | Where-Object { $_.ProcessName -eq 'python' -and $_.Id -ne $PID } |
        ForEach-Object {
          Write-Host "[WARN] Killing stale Python PID=$($_.Id) StartTime=$($_.StartTime)"
          Stop-Process -Id $_.Id -Force -ErrorAction SilentlyContinue
        }
      Start-Sleep -Seconds 1
    - pip install pyserial
  script:
    # Screen 00 (タイトル) → Screen 01 (メイン) への画面遷移テスト。
    # touch コマンドで疑似タッチイベントを注入し、AppWizard の画面遷移を実行。
    # Screen 00 → 01 遷移には touch × 2 回が必要 (VAR_01 が 2 になると遷移条件成立)。
    - |
      Write-Host "=== Screen Navigation Test ==="
      Write-Host "  Port: $env:COMMAND_PORT @ ${env:COMMAND_BAUD_RATE}bps"
      python "$env:CI_PROJECT_DIR\test_scripts\uart_test\test_touch_navigation.py" `
        --cmd-port "$env:COMMAND_PORT" --cmd-baud $env:COMMAND_BAUD_RATE `
        --timeout 30 --prompt-timeout 30 --initial-wait 1

provision_aws_credentials:
  stage: flash
  tags:
    - run_ishiguro_machine
  resource_group: rx72n-device
  timeout: 3 minutes
  rules:
    - if: $RUN_OTA_ONLY == "true"
      when: never
    - if: $RUN_AWS_TESTS == "true"
  needs:
    - job: download_aws_demos
  before_script:
    - |
      Get-Process | Where-Object { $_.ProcessName -eq 'python' -and $_.Id -ne $PID } |
        ForEach-Object {
          Write-Host "[WARN] Killing stale Python PID=$($_.Id) StartTime=$($_.StartTime)"
          Stop-Process -Id $_.Id -Force -ErrorAction SilentlyContinue
        }
      Start-Sleep -Seconds 1
    - pip install pyserial
  script:
    # AWS IoT Core プロビジョニング: 証明書・秘密鍵・エンドポイント・Thing名・
    # OTA 署名検証証明書をデータフラッシュに書き込む。
    # flash_boot_loader の -erase-chip でデータフラッシュが毎回消去されるため、
    # パイプライン実行ごとにプロビジョニングが必要。
    # --device-id で device_config.json からポート・エンドポイント・Thing名を解決。
    # 証明書は CI/CD File 型変数 AWS_CLIENT_CERT_{ID} / AWS_PRIVATE_KEY_{ID} から取得。
    # --codesigner-cert: OTA 署名検証用証明書（sample_keys/secp256r1.crt）も書き込む。
    - |
      Write-Host "=== AWS IoT Core Provisioning ==="
      Write-Host "  Device ID: $env:DEVICE_ID"
      python "$env:CI_PROJECT_DIR\test_scripts\uart_test\provision_aws.py" `
        --device-id "$env:DEVICE_ID" `
        --codesigner-cert "$env:CI_PROJECT_DIR\sample_keys\secp256r1.crt"

confirm_aws_mqtt:
  stage: test
  tags:
    - run_ishiguro_machine
  resource_group: rx72n-device
  timeout: 5 minutes
  rules:
    - if: $RUN_OTA_ONLY == "true"
      when: never
    - if: $RUN_AWS_TESTS == "true"
  needs:
    - job: test_screen_navigation
  retry:
    max: 1
    when: script_failure
  before_script:
    - |
      Get-Process | Where-Object { $_.ProcessName -eq 'python' -and $_.Id -ne $PID } |
        ForEach-Object {
          Write-Host "[WARN] Killing stale Python PID=$($_.Id) StartTime=$($_.StartTime)"
          Stop-Process -Id $_.Id -Force -ErrorAction SilentlyContinue
        }
      Start-Sleep -Seconds 1
    - pip install pyserial
  script:
    # AWS IoT Core MQTT 接続検証: MCU をリセットし、ログポートから
    # 3つのマイルストーン (DHCP, TLS, MQTT CONNACK) を検出する。
    # --device-id で device_config.json からコマンド/ログポートを解決。
    # retry: フルパイプライン実行時、MCU の初回 MQTT 接続が不安定なため
    #   1回のリトライを許可。リトライ時は MCU が再リセットされ成功する。
    - |
      Write-Host "=== AWS IoT Core MQTT Connectivity Test ==="
      Write-Host "  Device ID: $env:DEVICE_ID"
      python "$env:CI_PROJECT_DIR\test_scripts\uart_test\test_aws_connectivity.py" `
        --device-id "$env:DEVICE_ID" --timeout 120

test_sd_update:
  stage: test
  tags:
    - run_ishiguro_machine
  resource_group: rx72n-device
  timeout: 10 minutes
  rules:
    - if: $RUN_OTA_ONLY == "true"
      when: never
    - if: $RUN_AWS_TESTS == "true" && $RUN_SD_UPDATE_TEST == "true"
  needs:
    - job: confirm_aws_mqtt
    - job: download_aws_demos
      artifacts: true
  before_script:
    - |
      Get-Process | Where-Object { $_.ProcessName -eq 'python' -and $_.Id -ne $PID } |
        ForEach-Object {
          Write-Host "[WARN] Killing stale Python PID=$($_.Id) StartTime=$($_.StartTime)"
          Stop-Process -Id $_.Id -Force -ErrorAction SilentlyContinue
        }
      Start-Sleep -Seconds 1
    - pip install pyserial
  script:
    # SD カードファームウェアアップデートの統合テスト。
    # 1. userprog.rsu を UART (sdcard write) 経由で SD カードに転送
    # 2. touch コマンドで FW Update 画面に遷移し Update 実行
    # 3. COM7 で boot_loader ログを監視（integrity check → bank swap → jump to user program）
    # 4. aws_demos 再起動確認
    # 5. SD カードから userprog.rsu を削除（次回パイプラインの boot_loader 干渉防止）
    # confirm_aws_mqtt 後に実行: aws_demos が起動済みで Screen 00 表示状態。
    # download_aws_demos の artifacts から userprog.rsu を取得。
    - |
      Write-Host "=== SD Card Firmware Update Test ==="
      Write-Host "  Device ID: $env:DEVICE_ID"
      Write-Host "  RSU file:  $env:CI_PROJECT_DIR\userprog.rsu"
      python "$env:CI_PROJECT_DIR\test_scripts\uart_test\test_sd_update.py" `
        --device-id "$env:DEVICE_ID" `
        --rsu "$env:CI_PROJECT_DIR\userprog.rsu" `
        --timeout 300

# ==============================================================================
# Phase 7: AWS IoT OTA テスト
# RUN_OTA_TEST=false でスキップ可能。
# OTA テストには2つの異なるバージョンの FW が必要:
#   v1 (APP_VERSION_BUILD=N)   : デバイスに初期書き込み。OTA Agent が稼働しジョブ待機
#   v2 (APP_VERSION_BUILD=N+1) : S3 にアップロードし OTA で配信
# ==============================================================================

build_ota:
  stage: build
  tags:
    - run_ishiguro_machine
  rules:
    - if: $RUN_OTA_TEST == "true"
  script:
    # ワークスペースと HardwareDebug をクリア
    - if (Test-Path "$env:WORKSPACE") { Remove-Item -Recurse -Force "$env:WORKSPACE" }
    - |
      @("aws_demos", "boot_loader") | ForEach-Object {
        $hd = "$env:CI_PROJECT_DIR\$env:E2STUDIO_PROJECTS\$_\HardwareDebug"
        if (Test-Path $hd) { Remove-Item -Recurse -Force $hd; Write-Host "Cleared: $hd" }
      }
    # ジャンクション作成（build ジョブと同じ）
    - |
      $shortRoot = "C:\rx72n-src"
      if (Test-Path $shortRoot) { cmd /c "rmdir `"$shortRoot`"" 2>$null }
      New-Item -ItemType Junction -Path $shortRoot -Target "$env:CI_PROJECT_DIR" | Out-Null
      Write-Host "Junction: $shortRoot -> $env:CI_PROJECT_DIR"
    - |
      $awsProj    = "$env:CI_PROJECT_DIR\$env:E2STUDIO_PROJECTS\aws_demos"
      $vendorsAws = "$env:CI_PROJECT_DIR\vendors\renesas\boards\rx72n-envision-kit\aws_demos"
      @("$awsProj\src\smc_gen", "$awsProj\application_code", "$awsProj\config_files") | ForEach-Object {
        if (Test-Path $_) { cmd /c "rmdir `"$_`"" 2>$null; Remove-Item $_ -Recurse -Force -ErrorAction SilentlyContinue }
      }
      New-Item -ItemType Directory -Path "$awsProj\src\smc_gen" -Force | Out-Null
      New-Item -ItemType Junction -Path "$awsProj\src\smc_gen\r_config" -Target "$vendorsAws\src\smc_gen\r_config" | Out-Null
      New-Item -ItemType Directory -Path "$awsProj\application_code" -Force | Out-Null
      New-Item -ItemType Junction -Path "$awsProj\application_code\renesas_code" -Target "$vendorsAws\application_code\renesas_code" | Out-Null
      New-Item -ItemType Junction -Path "$awsProj\application_code\aws_code" -Target "$vendorsAws\application_code\aws_code" | Out-Null
      New-Item -ItemType Junction -Path "$awsProj\application_code\smc_gen" -Target "$vendorsAws\src\smc_gen" | Out-Null
      Copy-Item "$vendorsAws\application_code\main.c" "$awsProj\application_code\main.c"
      New-Item -ItemType Junction -Path "$awsProj\config_files" -Target "$vendorsAws\config_files" | Out-Null
      Write-Host "Junctions created for OTA build"
    # aws_demo_config.h を OTA モードに切り替え
    # MQTT Mutual Auth デモを無効化し、OTA MQTT Update デモを有効化
    - |
      $configFile = "$env:CI_PROJECT_DIR\vendors\renesas\boards\rx72n-envision-kit\aws_demos\config_files\aws_demo_config.h"
      Write-Host "=== Switching to OTA demo mode ==="
      (Get-Content $configFile) `
        -replace '^#define CONFIG_CORE_MQTT_MUTUAL_AUTH_DEMO_ENABLED', '//#define CONFIG_CORE_MQTT_MUTUAL_AUTH_DEMO_ENABLED' |
        Set-Content $configFile
      Add-Content $configFile "`n#define CONFIG_OTA_MQTT_UPDATE_DEMO_ENABLED`n"
      Write-Host "  Disabled: CONFIG_CORE_MQTT_MUTUAL_AUTH_DEMO_ENABLED"
      Write-Host "  Enabled:  CONFIG_OTA_MQTT_UPDATE_DEMO_ENABLED"
    # バージョン番号を v1 に設定 (CI_PIPELINE_IID * 2)
    # OTA はダウングレード禁止 (otaconfigAllowDowngrade=0) のため、
    # パイプラインごとに一意のバージョン番号が必要
    - |
      $otaConfig = "$env:CI_PROJECT_DIR\vendors\renesas\boards\rx72n-envision-kit\aws_demos\config_files\ota_demo_config.h"
      $v1 = [int]$env:CI_PIPELINE_IID * 2
      Write-Host "=== Setting OTA version: v1 (build=$v1) ==="
      (Get-Content $otaConfig) -replace 'APP_VERSION_BUILD\s+\d+', "APP_VERSION_BUILD    $v1" | Set-Content $otaConfig
    # v1 ビルド (OTA Agent 稼働ファームウェア)
    - |
      $shortRoot = "C:\rx72n-src"
      $shortProj = "$shortRoot\$env:E2STUDIO_PROJECTS"
      $logFile = "$env:CI_PROJECT_DIR\e2studio_ota_build.log"
      $e2base = @("--launcher.suppressErrors", "-nosplash", "-application", "org.eclipse.cdt.managedbuilder.core.headlessbuild", "-data", "$env:WORKSPACE")
      $imports = @("-import", "$shortProj\aws_demos", "-import", "$shortProj\boot_loader")
      # -cleanBuild all: import したプロジェクト (aws_demos + rx72n_boot_loader) をすべてビルド。
      # 注意: boot_loader ディレクトリの e2studio プロジェクト名は "rx72n_boot_loader"（.project 参照）。
      # カンマ区切りの個別指定 ("aws_demos/HardwareDebug,rx72n_boot_loader/HardwareDebug") より
      # "all" の方が安全で、import 済みプロジェクトのみがビルドされる。
      Write-Host "=== Build v1 (aws_demos + boot_loader) ==="
      & "$env:E2STUDIO" @e2base @imports -cleanBuild all 2>&1 | Tee-Object -FilePath $logFile | Out-Null
      Write-Host "e2studio exit code: $LASTEXITCODE"

      # 診断: ビルドログの末尾20行
      Write-Host "--- Build log tail ---"
      Get-Content $logFile -Tail 20 -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $_" }

      # .mot ファイルの検索（ジャンクション経由とCI_PROJECT_DIR直接の両方を試行）
      $mot_aws = Get-ChildItem "$shortProj\aws_demos\HardwareDebug\*.mot" -ErrorAction SilentlyContinue
      if (-not $mot_aws) { $mot_aws = Get-ChildItem "$env:CI_PROJECT_DIR\$env:E2STUDIO_PROJECTS\aws_demos\HardwareDebug\*.mot" -ErrorAction SilentlyContinue }
      $mot_boot = Get-ChildItem "$env:WORKSPACE\rx72n_boot_loader\HardwareDebug\*.mot" -ErrorAction SilentlyContinue
      if (-not $mot_boot) { $mot_boot = Get-ChildItem "$shortProj\boot_loader\HardwareDebug\*.mot" -ErrorAction SilentlyContinue }
      if (-not $mot_boot) { $mot_boot = Get-ChildItem "$env:CI_PROJECT_DIR\$env:E2STUDIO_PROJECTS\boot_loader\HardwareDebug\*.mot" -ErrorAction SilentlyContinue }
      Write-Host "  aws_demos .mot:  $(if ($mot_aws) { $mot_aws.FullName } else { 'NOT FOUND' })"
      Write-Host "  boot_loader .mot: $(if ($mot_boot) { $mot_boot.FullName } else { 'NOT FOUND' })"
      if (-not $mot_aws) { Write-Host "ERROR: v1 aws_demos.mot not found"; exit 1 }
      if (-not $mot_boot) { Write-Host "ERROR: v1 boot_loader.mot not found"; exit 1 }
      Write-Host "  v1 .mot: $($mot_aws.FullName)"
    # v1.mot → ota_v1.rsu 変換
    - |
      pip install cryptography
      $mot = Get-ChildItem "$env:CI_PROJECT_DIR\$env:E2STUDIO_PROJECTS\aws_demos\HardwareDebug\*.mot" -ErrorAction SilentlyContinue
      if (-not $mot) { $mot = Get-ChildItem "C:\rx72n-src\$env:E2STUDIO_PROJECTS\aws_demos\HardwareDebug\*.mot" }
      $v1 = [int]$env:CI_PIPELINE_IID * 2
      python "$env:CI_PROJECT_DIR\tools\mcu-tool-rx\mot_to_rsu.py" `
        --mot "$($mot.FullName)" --key "$env:CI_PROJECT_DIR\sample_keys\secp256r1.privatekey" `
        -o "$env:CI_PROJECT_DIR\ota_v1.rsu" --seq-no $v1
      Write-Host "Generated: ota_v1.rsu"
    # v2 ビルド (OTA で配信するファームウェア)
    # HardwareDebug をクリアしてバージョン番号を変更してリビルド
    - |
      $hd = "$env:CI_PROJECT_DIR\$env:E2STUDIO_PROJECTS\aws_demos\HardwareDebug"
      if (Test-Path $hd) { Remove-Item -Recurse -Force $hd }
      $otaConfig = "$env:CI_PROJECT_DIR\vendors\renesas\boards\rx72n-envision-kit\aws_demos\config_files\ota_demo_config.h"
      $v2 = [int]$env:CI_PIPELINE_IID * 2 + 1
      Write-Host "=== Setting OTA version: v2 (build=$v2) ==="
      (Get-Content $otaConfig) -replace 'APP_VERSION_BUILD\s+\d+', "APP_VERSION_BUILD    $v2" | Set-Content $otaConfig
    - |
      $shortRoot = "C:\rx72n-src"
      $shortProj = "$shortRoot\$env:E2STUDIO_PROJECTS"
      $logFile = "$env:CI_PROJECT_DIR\e2studio_ota_build_v2.log"
      $e2base = @("--launcher.suppressErrors", "-nosplash", "-application", "org.eclipse.cdt.managedbuilder.core.headlessbuild", "-data", "$env:WORKSPACE")
      # v2 は aws_demos のみリビルド。boot_loader は v1 と同じで変更不要だが、
      # -cleanBuild all を使って確実にビルドする（boot_loader の再ビルドは無害）。
      Write-Host "=== Build v2 (aws_demos only) ==="
      & "$env:E2STUDIO" @e2base -cleanBuild all 2>&1 | Tee-Object -FilePath $logFile | Out-Null
      Write-Host "e2studio exit code: $LASTEXITCODE"

      # 診断: ビルドログの末尾20行
      Write-Host "--- Build log tail ---"
      Get-Content $logFile -Tail 20 -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $_" }

      $mot_aws = Get-ChildItem "$shortProj\aws_demos\HardwareDebug\*.mot" -ErrorAction SilentlyContinue
      if (-not $mot_aws) { $mot_aws = Get-ChildItem "$env:CI_PROJECT_DIR\$env:E2STUDIO_PROJECTS\aws_demos\HardwareDebug\*.mot" -ErrorAction SilentlyContinue }
      if (-not $mot_aws) { Write-Host "ERROR: v2 aws_demos.mot not found"; exit 1 }
      Write-Host "  v2 .mot: $($mot_aws.FullName)"
    # v2.mot → ota_v2.rsu 変換
    - |
      $mot = Get-ChildItem "$env:CI_PROJECT_DIR\$env:E2STUDIO_PROJECTS\aws_demos\HardwareDebug\*.mot" -ErrorAction SilentlyContinue
      if (-not $mot) { $mot = Get-ChildItem "C:\rx72n-src\$env:E2STUDIO_PROJECTS\aws_demos\HardwareDebug\*.mot" }
      $v2 = [int]$env:CI_PIPELINE_IID * 2 + 1
      python "$env:CI_PROJECT_DIR\tools\mcu-tool-rx\mot_to_rsu.py" `
        --mot "$($mot.FullName)" --key "$env:CI_PROJECT_DIR\sample_keys\secp256r1.privatekey" `
        -o "$env:CI_PROJECT_DIR\ota_v2.rsu" --seq-no $v2
      Write-Host "Generated: ota_v2.rsu"
    # 結果サマリー
    - |
      $v1 = [int]$env:CI_PIPELINE_IID * 2
      $v2 = $v1 + 1
      Write-Host ""
      Write-Host "=== OTA Build Summary ==="
      Write-Host "  v1 (initial): ota_v1.rsu (APP_VERSION_BUILD=$v1)"
      Write-Host "  v2 (update):  ota_v2.rsu (APP_VERSION_BUILD=$v2)"
      if (Test-Path "$env:CI_PROJECT_DIR\ota_v1.rsu") { Write-Host "  v1 size: $((Get-Item "$env:CI_PROJECT_DIR\ota_v1.rsu").Length) bytes" }
      if (Test-Path "$env:CI_PROJECT_DIR\ota_v2.rsu") { Write-Host "  v2 size: $((Get-Item "$env:CI_PROJECT_DIR\ota_v2.rsu").Length) bytes" }
  artifacts:
    when: always
    paths:
      - ota_v1.rsu
      - ota_v2.rsu
      - e2studio_ota_build.log
      - e2studio_ota_build_v2.log
      - projects/renesas/rx72n_envision_kit/e2studio/boot_loader/HardwareDebug/*.mot
    expire_in: 1 week

prepare_ota:
  stage: test
  tags:
    - run_ishiguro_machine
  resource_group: rx72n-device
  timeout: 5 minutes
  rules:
    - if: $RUN_OTA_TEST == "true"
  needs:
    # 通常テスト完了後に実行。optional: true により、スキップされたジョブへの依存は無視。
    # RUN_OTA_ONLY=true 時は全テストジョブがスキップされるため、全て optional にする。
    - job: test_sd_update
      optional: true
    - job: confirm_aws_mqtt
      optional: true
    - job: test_screen_navigation
      optional: true
    - job: build_ota
      artifacts: true
  before_script:
    - |
      Get-Process | Where-Object { $_.ProcessName -eq 'python' -and $_.Id -ne $PID } |
        ForEach-Object {
          Write-Host "[WARN] Killing stale Python PID=$($_.Id) StartTime=$($_.StartTime)"
          Stop-Process -Id $_.Id -Force -ErrorAction SilentlyContinue
        }
      Start-Sleep -Seconds 1
    - pip install cryptography pyserial
  script:
    # OTA デバイス準備: 通常テスト完了後に実行。
    # 通常テスト時は aws_demos (MQTT デモ) が実行中のため、OTA デモ版の aws_demos に
    # 入れ替える必要がある。erase-chip で全フラッシュを消去し、boot_loader 再書き込み→
    # UART で ota_v1.rsu をダウンロード → 再プロビジョニング（erase-chip でデータフラッシュ消去済み）。
    # Step 1: boot_loader 書き込み (erase-chip + program + run)
    - |
      $mot = "$env:CI_PROJECT_DIR\$env:E2STUDIO_PROJECTS\boot_loader\HardwareDebug\rx72n_boot_loader.mot"
      if (-not (Test-Path $mot)) {
        Write-Host "ERROR: boot_loader.mot not found: $mot"
        exit 1
      }
      Write-Host "=== Flash boot_loader (OTA) ==="
      & "$env:RFP_CLI" -device RX72x -tool "e2l:$env:E2LITE_SERIAL" -if fine -speed 1500K `
        -auth id FFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFF -erase-chip -noquery
      if ($LASTEXITCODE -ne 0) { Write-Host "ERROR: Erase-chip failed"; exit 1 }
      & "$env:RFP_CLI" -device RX72x -tool "e2l:$env:E2LITE_SERIAL" -if fine -speed 1500K `
        -auth id FFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFF -p "$mot" -v -run -noquery
      if ($LASTEXITCODE -ne 0) { Write-Host "ERROR: Flash failed"; exit 1 }
      Write-Host "Boot loader flashed successfully."
    # Step 2: v1.rsu を UART ダウンロード
    - |
      $rsu = "$env:CI_PROJECT_DIR\ota_v1.rsu"
      if (-not (Test-Path $rsu)) {
        Write-Host "ERROR: ota_v1.rsu not found"
        exit 1
      }
      Write-Host "=== UART Download v1 (OTA firmware) ==="
      Write-Host "  RSU:  $rsu ($((Get-Item $rsu).Length) bytes)"
      Write-Host "  Port: $env:UART_PORT @ ${env:UART_BAUD_RATE}bps"
      python "$env:CI_PROJECT_DIR\test_scripts\uart_test\test_uart_download.py" `
        --rsu "$rsu" --port "$env:UART_PORT" --baud $env:UART_BAUD_RATE `
        --timeout 300 --diag --wait-for-ready --ready-timeout 60
      if ($LASTEXITCODE -ne 0) { Write-Host "ERROR: UART download failed"; exit 1 }
    # Step 3: AWS プロビジョニング (endpoint, thing, cert, key, codesigner cert)
    - |
      Write-Host "=== AWS IoT Core Provisioning (with code signer cert) ==="
      Write-Host "  Device ID: $env:DEVICE_ID"
      python "$env:CI_PROJECT_DIR\test_scripts\uart_test\provision_aws.py" `
        --device-id "$env:DEVICE_ID" `
        --codesigner-cert "$env:CI_PROJECT_DIR\sample_keys\secp256r1.crt"
      if ($LASTEXITCODE -ne 0) { Write-Host "ERROR: Provisioning failed"; exit 1 }
    # Step 4: リセットして OTA Agent 起動確認
    # provision_aws.py 後、デバイスをリセットして MQTT 接続 + OTA Agent 起動を待つ
    - |
      Write-Host "=== Resetting device ==="
      $cmdPort = $env:COMMAND_PORT
      $ser = [System.IO.Ports.SerialPort]::new($cmdPort, [int]$env:COMMAND_BAUD_RATE)
      $ser.Open()
      $ser.Write("reset`r`n")
      Start-Sleep -Seconds 1
      $ser.Close()
      Write-Host "Reset command sent. Waiting for OTA Agent startup..."
      Start-Sleep -Seconds 10

test_ota:
  stage: test
  tags:
    - run_ishiguro_machine
  resource_group: rx72n-device
  timeout: 15 minutes
  rules:
    - if: $RUN_OTA_TEST == "true"
  needs:
    - job: prepare_ota
    - job: build_ota
      artifacts: true
  before_script:
    - |
      Get-Process | Where-Object { $_.ProcessName -eq 'python' -and $_.Id -ne $PID } |
        ForEach-Object {
          Write-Host "[WARN] Killing stale Python PID=$($_.Id) StartTime=$($_.StartTime)"
          Stop-Process -Id $_.Id -Force -ErrorAction SilentlyContinue
        }
      Start-Sleep -Seconds 1
    - pip install pyserial awscli
  script:
    # OTA テスト: v2.rsu を S3 にアップロードし、OTA ジョブを作成し、
    # デバイス側のログでダウンロード→署名検証→自己テスト→受理を確認
    - |
      $v2 = [int]$env:CI_PIPELINE_IID * 2 + 1
      Write-Host "=== AWS IoT OTA Update Test ==="
      Write-Host "  Expected version build: $v2"
      python -u "$env:CI_PROJECT_DIR\test_scripts\uart_test\test_ota.py" `
        --device-id "$env:DEVICE_ID" `
        --rsu "$env:CI_PROJECT_DIR\ota_v2.rsu" `
        --s3-bucket "$env:OTA_S3_BUCKET" `
        --ota-role-arn "$env:OTA_ROLE_ARN" `
        --expected-build $v2 `
        --timeout 600
