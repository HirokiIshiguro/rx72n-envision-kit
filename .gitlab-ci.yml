flash_boot_loader:
  stage: flash_boot
  extends:
    - .pi_flash_job
    - .pi_pyserial_job
    - .rx72n_set_matrix
  rules:
    - if: $RUN_RFP_SOAK_TEST == "true"
      when: never
    - if: $RUN_PHASE8B_BUILD_ONLY == "true"
      when: never
    - if: $RUN_PHASE8B_BASELINE == "true"
      when: never
    - if: $RUN_PHASE8B_OTA == "true"
      when: never
    - if: $RUN_OTA_BOUNDARY_ONLY == "true"
      when: never
    - if: $RUN_OTA_ONLY == "true"
      when: never
    - when: always
  needs:
    - job: build
      artifacts: true
  script:
    - |
      set -euo pipefail
      source "$CI_PROJECT_DIR/tools/ci/acquire_pi_device_lock.sh" "$DEVICE_ID"
      . "$CI_PROJECT_DIR/tools/ci/load_rx72n_set_env.sh"
      snapshot_log="$CI_PROJECT_DIR/boot_loader_hardware_state.log"
      health_log="$CI_PROJECT_DIR/boot_loader_health.log"
      : > "$snapshot_log"
      : > "$health_log"
      trap 'RFP_STATE_DEVICE=RX72x bash "$CI_PROJECT_DIR/tools/ci/print_pi_hardware_state.sh" UART_PORT COMMAND_PORT > "$snapshot_log" 2>&1 || true' ERR
      mot="$CI_PROJECT_DIR/$E2STUDIO_PROJECTS/boot_loader/HardwareDebug/rx72n_boot_loader.mot"
      if [[ ! -f "$mot" ]]; then
        echo "ERROR: $mot not found"
        exit 1
      fi
      echo "=== Flash boot_loader ==="
      echo "  .mot:    $mot"
      echo "  Device:  RX72x"
      echo "  Tool:    $RFP_TOOL"
      echo "  I/F:     FINE"
      "$RFP_CLI" -device RX72x -tool "$RFP_TOOL" -if fine -speed "$RFP_SPEED" \
        -auth id FFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFF -erase-chip -noquery
      "$RFP_CLI" -device RX72x -tool "$RFP_TOOL" -if fine -speed "$RFP_SPEED" \
        -auth id FFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFF -p "$mot" -v -run -noquery
      RFP_STATE_DEVICE=RX72x bash "$CI_PROJECT_DIR/tools/ci/print_pi_hardware_state.sh" UART_PORT COMMAND_PORT > "$snapshot_log" 2>&1 || true
      echo "Flash completed successfully. Boot loader is running."
      if [[ "${RUN_HW_HEALTHCHECK}" == "true" ]]; then
        bash "$CI_PROJECT_DIR/tools/ci/validate_pi_serial_path.sh" UART_PORT
        python3 "$CI_PROJECT_DIR/test_scripts/uart_test/check_device_health.py" \
          boot-banner \
          --port "$UART_PORT" \
          --baud "$UART_BAUD_RATE" \
          --expect "RX72N secure boot program" \
          --expect "send \"userprog.rsu\" via UART." \
          --timeout 20 | tee "$health_log"
      else
        echo "  Boot loader health-check skipped (RUN_HW_HEALTHCHECK=false)."
      fi
  artifacts:
    when: always
    paths:
      - boot_loader_hardware_state.log
      - boot_loader_health.log
    expire_in: 1 week

rfp_soak_test:
  stage: health
  extends:
    - .pi_flash_job
    - .rx72n_set_matrix
  timeout: 30 minutes
  rules:
    - if: $RUN_RFP_SOAK_TEST == "true"
    - when: never
  needs:
    - job: build
      artifacts: true
  script:
    - |
      set -euo pipefail
      source "$CI_PROJECT_DIR/tools/ci/acquire_pi_device_lock.sh" "$DEVICE_ID"
      . "$CI_PROJECT_DIR/tools/ci/load_rx72n_set_env.sh"
      output_dir="$CI_PROJECT_DIR/rfp_soak_${DEVICE_ID}"
      mode="${RFP_SOAK_MODE:-sig}"
      loops="${RFP_SOAK_LOOPS:-25}"
      sleep_seconds="${RFP_SOAK_SLEEP_SECONDS:-1}"
      cmd=(bash "$CI_PROJECT_DIR/tools/ci/run_rfp_soak_test.sh"
        --output-dir "$output_dir"
        --loops "$loops"
        --sleep-seconds "$sleep_seconds"
        --mode "$mode"
        --device RX72x
        --tool "$RFP_TOOL"
        --speed "$RFP_SPEED"
        --auth-id FFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFF
        --port-env UART_PORT
        --port-env COMMAND_PORT)
      if [[ "$mode" == "flash_boot" ]]; then
        mot="$CI_PROJECT_DIR/$E2STUDIO_PROJECTS/boot_loader/HardwareDebug/rx72n_boot_loader.mot"
        if [[ ! -f "$mot" ]]; then
          echo "ERROR: boot_loader.mot not found for soak test: $mot"
          exit 1
        fi
        cmd+=(--mot "$mot")
      fi
      printf 'Running:'
      printf ' %q' "${cmd[@]}"
      printf '\n'
      "${cmd[@]}"
  artifacts:
    when: always
    paths:
      - rfp_soak_${DEVICE_ID}/
    expire_in: 1 week

download_aws_demos:
  stage: download
  extends:
    - .pi_flash_job
    - .pi_crypto_serial_job
    - .rx72n_set_matrix
  rules:
    - if: $RUN_RFP_SOAK_TEST == "true"
      when: never
    - if: $RUN_PHASE8B_BUILD_ONLY == "true"
      when: never
    - if: $RUN_PHASE8B_BASELINE == "true"
      when: never
    - if: $RUN_PHASE8B_OTA == "true"
      when: never
    - if: $RUN_OTA_BOUNDARY_ONLY == "true"
      when: never
    - if: $RUN_OTA_ONLY == "true"
      when: never
    - when: always
  needs:
    - job: build
      artifacts: true
    - job: flash_boot_loader
      artifacts: false
  variables:
    # .rsu 生成に使うシーケンス番号（OTA 更新ごとに増加させる）
    RSU_SEQ_NO: "1"
  script:
    - |
      set -euo pipefail
      source "$CI_PROJECT_DIR/tools/ci/acquire_pi_device_lock.sh" "$DEVICE_ID"
      . "$CI_PROJECT_DIR/tools/ci/load_rx72n_set_env.sh"
      bash "$CI_PROJECT_DIR/tools/ci/validate_pi_serial_path.sh" UART_PORT
      mot="$CI_PROJECT_DIR/$E2STUDIO_PROJECTS/aws_demos/HardwareDebug/aws_demos.mot"
      rsu="$CI_PROJECT_DIR/userprog_${DEVICE_ID}.rsu"
      key="$CI_PROJECT_DIR/sample_keys/secp256r1.privatekey"
      if [[ ! -f "$mot" ]]; then
        echo "ERROR: aws_demos.mot not found: $mot"
        exit 1
      fi
      echo "=== Convert .mot to .rsu ==="
      echo "  MOT: $mot"
      echo "  Key: $key"
      echo "  RSU: $rsu"
      echo "  Seq: $RSU_SEQ_NO"
      python3 "$CI_PROJECT_DIR/tools/mcu-tool-rx/mot_to_rsu.py" \
        --mot "$mot" --key "$key" -o "$rsu" --seq-no "$RSU_SEQ_NO"
      echo "=== UART Download ==="
      echo "  RSU:  $rsu"
      echo "  Port: $UART_PORT @ ${UART_BAUD_RATE}bps"
      python3 "$CI_PROJECT_DIR/test_scripts/uart_test/test_uart_download.py" \
        --rsu "$rsu" --port "$UART_PORT" --baud "$UART_BAUD_RATE" \
        --timeout 300 --diag
  artifacts:
    paths:
      - userprog_${DEVICE_ID}.rsu
    expire_in: 1 week

capture_after_download_aws_demos:
  stage: observe
  extends:
    - .windows_capture_job
  allow_failure: true
  when: always
  rules:
    - if: $RUN_PHASE8B_BUILD_ONLY == "true"
      when: never
    - if: $RUN_PHASE8B_BASELINE == "true"
      when: never
    - if: $RUN_PHASE8B_DIRECT_FLASH_DIAG == "true"
      when: never
    - if: $RUN_PHASE8B_OTA == "true"
      when: never
    - if: $RUN_OTA_BOUNDARY_ONLY == "true"
      when: never
    - if: $RUN_RFP_SOAK_TEST == "true"
      when: never
    - if: $RUN_OTA_ONLY == "true"
      when: never
    - if: $CAPTURE_AFTER_AWS_DEMOS == "true"
    - when: never
  script:
    - |
      $captureDir = "$env:CI_PROJECT_DIR\camera_capture"
      $timestamp = Get-Date -Format "yyyyMMdd_HHmmss"
      $imagePath = "$captureDir\monsterx_after_aws_demos_$timestamp.jpg"
      $devicesLog = "$captureDir\monsterx_after_aws_demos_${timestamp}_devices.txt"
      New-Item -ItemType Directory -Force -Path $captureDir | Out-Null
      & "$env:CI_PROJECT_DIR\tools\ci\capture_monsterx_frame.ps1" `
        -OutputPath $imagePath `
        -DevicesLogPath $devicesLog `
        -VideoDeviceName $env:CAPTURE_VIDEO_DEVICE `
        -Filter $env:CAPTURE_FILTER
  artifacts:
    when: always
    paths:
      - camera_capture/*.jpg
      - camera_capture/*.txt
    expire_in: 1 week

health_aws_demos_startup:
  stage: health
  extends:
    - .pi_device_job
    - .pi_pyserial_job
  timeout: 4 minutes
  rules:
    - if: $RUN_PHASE8B_BUILD_ONLY == "true"
      when: never
    - if: $RUN_PHASE8B_BASELINE == "true"
      when: never
    - if: $RUN_PHASE8B_OTA == "true"
      when: never
    - if: $RUN_OTA_BOUNDARY_ONLY == "true"
      when: never
    - if: $RUN_OTA_ONLY == "true"
      when: never
    - if: $RUN_HW_HEALTHCHECK == "true"
    - when: never
  needs:
    - job: download_aws_demos
  script:
    - |
      set -euo pipefail
      source "$CI_PROJECT_DIR/tools/ci/acquire_pi_device_lock.sh" "$DEVICE_ID"
      bash "$CI_PROJECT_DIR/tools/ci/validate_pi_serial_path.sh" UART_PORT COMMAND_PORT
      bash "$CI_PROJECT_DIR/tools/ci/print_pi_hardware_state.sh" UART_PORT COMMAND_PORT | tee "$CI_PROJECT_DIR/aws_demos_hardware_state.log"
      echo "=== aws_demos Startup Health Check ==="
      python3 "$CI_PROJECT_DIR/test_scripts/uart_test/check_device_health.py" \
        command-prompt \
        --port "$COMMAND_PORT" \
        --baud "$COMMAND_BAUD_RATE" \
        --initial-wait 3 \
        --prompt-timeout 60 \
        --command-timeout 10 \
        --probe-command version \
        --probe-expect v | tee "$CI_PROJECT_DIR/aws_demos_health.log"
  artifacts:
    when: always
    paths:
      - aws_demos_hardware_state.log
      - aws_demos_health.log
    expire_in: 1 week

