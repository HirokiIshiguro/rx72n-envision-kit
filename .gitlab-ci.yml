flash_phase8b_boot_loader:
  stage: flash
  extends:
    - .pi_flash_job
    - .pi_pyserial_job
  rules:
    - if: $RUN_PHASE8B_BUILD_ONLY == "true"
      when: never
    - if: $RUN_PHASE8B_OTA == "true"
      when: never
    - if: $RUN_OTA_ONLY == "true"
      when: never
    - if: $RUN_PHASE8B_BASELINE == "true"
    - when: never
  needs:
    - job: build_phase8b
      artifacts: true
  script:
    - |
      set -euo pipefail
      source "$CI_PROJECT_DIR/tools/ci/acquire_pi_device_lock.sh" "$DEVICE_ID"
      mot="$CI_PROJECT_DIR/$PHASE8B_E2STUDIO_PROJECTS/boot_loader_rx72n_envision_kit/e2studio_ccrx/HardwareDebug/boot_loader_rx72n_envision_kit.mot"
      if [[ ! -f "$mot" ]]; then
        echo "ERROR: $mot not found"
        exit 1
      fi
      echo "=== Flash phase8b boot_loader ==="
      echo "  .mot:   $mot"
      echo "  Device: RX72x"
      echo "  Tool:   $RFP_TOOL"
      "$RFP_CLI" -device RX72x -tool "$RFP_TOOL" -if fine -speed "$RFP_SPEED" \
        -auth id FFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFF -erase-chip -noquery
      "$RFP_CLI" -device RX72x -tool "$RFP_TOOL" -if fine -speed "$RFP_SPEED" \
        -auth id FFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFF -p "$mot" -v -run -noquery
      if [[ "${RUN_HW_HEALTHCHECK}" == "true" ]]; then
        bash "$CI_PROJECT_DIR/tools/ci/validate_pi_serial_path.sh" UART_PORT
        if ! python3 "$CI_PROJECT_DIR/test_scripts/uart_test/check_device_health.py" \
          boot-banner \
          --port "$UART_PORT" \
          --baud "$UART_BAUD_RATE" \
          --expect "BootLoader" \
          --expect "send image(*.rsu) via UART." \
          --timeout 20 | tee "$CI_PROJECT_DIR/phase8b_boot_loader_health.log"; then
          echo "[WARN] phase8b boot_loader banner health-check did not observe the one-shot UART banner."
          echo "[WARN] Continue to download_phase8b_app, which performs the real ready-message gate."
        fi
      fi
  artifacts:
    when: always
    paths:
      - phase8b_boot_loader_health.log
    expire_in: 1 week

download_phase8b_app:
  stage: flash
  extends:
    - .pi_flash_job
    - .pi_crypto_serial_job
  rules:
    - if: $RUN_PHASE8B_BUILD_ONLY == "true"
      when: never
    - if: $RUN_PHASE8B_OTA == "true"
      when: never
    - if: $RUN_OTA_ONLY == "true"
      when: never
    - if: $RUN_PHASE8B_BASELINE == "true"
    - when: never
  needs:
    - job: build_phase8b
      artifacts: true
    - job: flash_phase8b_boot_loader
  variables:
    RSU_SEQ_NO: "1"
  script:
    - |
      set -euo pipefail
      source "$CI_PROJECT_DIR/tools/ci/acquire_pi_device_lock.sh" "$DEVICE_ID"
      bash "$CI_PROJECT_DIR/tools/ci/validate_pi_serial_path.sh" UART_PORT
      mot="$CI_PROJECT_DIR/$PHASE8B_E2STUDIO_PROJECTS/aws_ether_rx72n_envision_kit/e2studio_ccrx/HardwareDebug/aws_ether_rx72n_envision_kit.mot"
      rsu_prefix="$CI_PROJECT_DIR/phase8b_userprog"
      rsu="${rsu_prefix}.rsu"
      key="$CI_PROJECT_DIR/sample_keys/secp256r1.privatekey"
      prm="$CI_PROJECT_DIR/$PHASE8B_E2STUDIO_PROJECTS/boot_loader_rx72n_envision_kit/e2studio_ccrx/src/smc_gen/r_fwup/tool/RX72N_DualBank_ImageGenerator_PRM.csv"
      builder="$CI_PROJECT_DIR/tools/build_fwup_v2_rsu.py"
      reset_cmd="$RFP_CLI -device RX72x -tool ${RFP_TOOL} -if fine -run -noquery"
      provision_reset_cmd="$RFP_CLI -device RX72x -tool ${RFP_TOOL} -if fine -auth id FFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFF -sig -run -noquery"
      if [[ ! -f "$mot" ]]; then
        echo "ERROR: phase8b app .mot not found: $mot"
        exit 1
      fi
      if [[ ! -f "$builder" ]]; then
        echo "ERROR: phase8b RSU builder not found: $builder"
        exit 1
      fi
      if [[ ! -f "$prm" ]]; then
        echo "ERROR: phase8b PRM file not found: $prm"
        exit 1
      fi
      echo "=== Generate phase8b RSU (FWUP v2 / RELFWV2 format) ==="
      echo "  MOT: $mot"
      echo "  PRM: $prm"
      echo "  RSU: $rsu"
      echo "  Reset: $reset_cmd"
      python3 "$builder" \
        --mot "$mot" \
        --prm "$prm" \
        --key "$key" \
        --output "$rsu"
      echo "=== UART Download phase8b app ==="
      python3 "$CI_PROJECT_DIR/test_scripts/uart_test/test_uart_download.py" \
        --rsu "$rsu" --port "$UART_PORT" --baud "$UART_BAUD_RATE" \
        --timeout 300 --diag --wait-for-ready --ready-timeout 60 \
        --send-chunk-size 128 --ack-each-chunk --ack-timeout 20 \
        --reset-cmd "$reset_cmd" \
        --ready-message "send image(*.rsu) via UART." \
        --success-message "execute image ..." \
        --success-timeout 30
      bash "$CI_PROJECT_DIR/tools/ci/validate_pi_serial_path.sh" COMMAND_PORT
      # phase8b の CLI は起動直後の短時間だけ有効。
      # prepare->provision の切り替え時は UART を開いたまま明示 reset して
      # CLI window を再捕捉する。
      echo "=== phase8b Provisioning (inline after first boot) ==="
      python3 -u "$CI_PROJECT_DIR/tools/provision_phase8b.py" \
        --device-id "$DEVICE_ID" \
        --port "$UART_PORT" \
        --baud "$UART_BAUD_RATE" \
        --codesigner-cert "$CI_PROJECT_DIR/sample_keys/secp256r1.crt" \
        --cli-timeout 40 \
        --reset-cmd "$provision_reset_cmd" \
        --reset-after-open \
        --shadow-port "$COMMAND_PORT" \
        --shadow-baud "$COMMAND_BAUD_RATE" \
        --shadow-name "command-port" \
        --no-reset
      echo "=== phase8b Software Reset via UART CLI ==="
      python3 "$CI_PROJECT_DIR/tools/ci/send_serial_command.py" \
        --port "$UART_PORT" \
        --baud "$UART_BAUD_RATE" \
        --command reset \
        --delay-after 1
      echo "=== phase8b MQTT baseline ==="
      python3 -u "$CI_PROJECT_DIR/tools/test_phase8b_mqtt.py" \
        --device-id "$DEVICE_ID" \
        --log-port "$UART_PORT" \
        --log-baud "$UART_BAUD_RATE" \
        --timeout 150 \
        --no-reset
  artifacts:
    when: always
    paths:
      - phase8b_userprog.rsu
    expire_in: 1 week

